<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>To Do list Dev Rl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
  <body id="body">
    <!-- tod heading -->
    <div id="heading-holder" class="container-md">
      <h1 id="heading">To do List</h1>
    </div>   

    <!-- nav and tab -->

    <!-- tab changing button -->
    <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pills-all-tab" data-bs-toggle="pill" data-bs-target="#pills-home" type="button" role="tab" aria-controls="pills-home" aria-selected="true">All</button>
        </li>

        <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-queued-tab" data-bs-toggle="pill" data-bs-target="#pills-profile" type="button" role="tab" aria-controls="pills-profile" aria-selected="false">Queued</button>
        </li>

        <li class="nav-item" role="presentation">
          <button class="nav-link" id="pills-done-tab" data-bs-toggle="pill" data-bs-target="#pills-contact" type="button" role="tab" aria-controls="pills-contact" aria-selected="false">Done</button>
        </li>

        <!-- Add task button -->
        <button class="btn " id="add-btn">+</button>

    </ul>
    
    <!-- page under each tab -->
    <div class="tab-content" id="pills-tabContent">
      <div class="tab-pane fade show active" id="pills-home" role="tabpanel" aria-labelledby="pills-home-tab" tabindex="0"></div>
      <div class="tab-pane fade" id="pills-profile" role="tabpanel" aria-labelledby="pills-profile-tab" tabindex="0"></div>
      <div class="tab-pane fade" id="pills-contact" role="tabpanel" aria-labelledby="pills-contact-tab" tabindex="0"></div>
    </div>

    <!--Text bar, visible later-->
    <div id="add-task-bar" class="card" style="width: 18rem;">
      <div class="card-body">
        <h5 class="card-title" style="color: #003049;">Add Task</h5>
          <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">Write your task</label>
            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
          </div>
          <a class="btn btn-outline-warning">Add</a>
      </div>
    </div>
    

    <!--logic-->
    <script src="./script.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
